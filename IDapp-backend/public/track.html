<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Trip - IDA - Indian Drivers Association</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0F0F1A 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0F0F1A;
        }

        .header {
            background: linear-gradient(135deg, #FF6B00 0%, #ff8f00 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .loader {
            border: 3px solid rgba(255, 107, 0, 0.2);
            border-top: 3px solid #FF6B00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #ff6b6b;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .error-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .error-state p {
            color: #a0a0a0;
            font-size: 14px;
        }

        .trip-info {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 107, 0, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #a0a0a0;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #e0e0e0;
            font-size: 15px;
            font-weight: 600;
            text-align: right;
        }

        .highlight {
            color: #FF6B00;
        }

        .timeline {
            margin: 20px 0;
        }

        .timeline-title {
            color: #FF6B00;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 9px;
            top: 40px;
            width: 2px;
            height: calc(100% + 20px);
            background: rgba(255, 107, 0, 0.2);
        }

        .timeline-dot {
            width: 20px;
            height: 20px;
            background: rgba(255, 107, 0, 0.3);
            border: 2px solid rgba(255, 107, 0, 0.5);
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .timeline-item.active .timeline-dot {
            background: #FF6B00;
            border-color: #ff8f00;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
        }

        .timeline-item.completed .timeline-dot {
            background: #4CAF50;
            border-color: #66BB6A;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-status {
            color: #e0e0e0;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .timeline-time {
            color: #a0a0a0;
            font-size: 13px;
        }

        .timeline-item.completed .timeline-status {
            color: #4CAF50;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease-out;
        }

        .card h3 {
            color: #FF6B00;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .person-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B00 0%, #ff8f00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .person-details h4 {
            color: #e0e0e0;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .person-details p {
            color: #a0a0a0;
            font-size: 13px;
        }

        .location-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 107, 0, 0.1);
        }

        .location-item:last-child {
            border-bottom: none;
        }

        .location-icon {
            font-size: 20px;
            color: #FF6B00;
            flex-shrink: 0;
        }

        .location-details {
            flex: 1;
        }

        .location-label {
            color: #a0a0a0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .location-text {
            color: #e0e0e0;
            font-size: 14px;
            word-break: break-word;
        }

        .status-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B00 0%, #ff8f00 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        .status-badge.completed {
            background: #4CAF50;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .refresh-info {
            text-align: center;
            color: #a0a0a0;
            font-size: 12px;
            padding: 10px;
            border-top: 1px solid rgba(255, 107, 0, 0.1);
        }

        @media (max-width: 480px) {
            .container {
                height: 100vh;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 15px;
            }

            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-value {
                text-align: left;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>IDA - Indian Drivers Association</h1>
            <p>Track Your Trip</p>
        </div>

        <div class="content" id="content">
            <div class="loading-state">
                <div class="loader"></div>
                <p>Loading trip details...</p>
            </div>
        </div>

        <div class="refresh-info" id="refreshInfo">
            Auto-refreshing every 10 seconds
        </div>
    </div>

    <script>
        // Extract token from URL
        function getTokenFromURL() {
            const pathParts = window.location.pathname.split('/');
            const trackIndex = pathParts.indexOf('track');
            if (trackIndex !== -1 && pathParts[trackIndex + 1]) {
                return pathParts[trackIndex + 1];
            }
            return null;
        }

        // Format date and time
        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Format address
        function formatAddress(address) {
            if (!address) return '-';
            if (typeof address === 'string') return address;
            if (address.location) return address.location;
            return '-';
        }

        // Get status emoji
        function getStatusEmoji(status) {
            const statusMap = {
                'booked': '📋',
                'driver_assigned': '👤',
                'arriving': '🚗',
                'in_progress': '🚕',
                'completed': '✅',
                'cancelled': '❌'
            };
            return statusMap[status] || '🔄';
        }

        // Get initials from name
        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        // Render trip details
        function renderTripDetails(trip) {
            const statuses = ['booked', 'driver_assigned', 'arriving', 'in_progress', 'completed'];
            const currentStatusIndex = statuses.indexOf(trip.status) || 0;

            let html = `
                <div class="trip-info">
                    <div class="info-row">
                        <div class="info-label">Trip ID</div>
                        <div class="info-value">${trip.tripId || '-'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Status</div>
                        <div class="info-value"><span class="status-badge ${trip.status === 'completed' ? 'completed' : ''}">${trip.status || 'Unknown'}</span></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Ride Started</div>
                        <div class="info-value">${formatDateTime(trip.startTime)}</div>
                    </div>
                </div>

                <div class="card">
                    <h3>🚗 Rider Information</h3>
                    <div class="card-content">
                        <div class="person-info">
                            <div class="avatar">${getInitials(trip.riderName)}</div>
                            <div class="person-details">
                                <h4>${trip.riderName || 'Unknown Rider'}</h4>
                                <p>Passenger</p>
                            </div>
                        </div>
                    </div>
                </div>

                ${trip.driverName ? `
                    <div class="card">
                        <h3>👨‍🚗 Driver Information</h3>
                        <div class="card-content">
                            <div class="person-info">
                                <div class="avatar">${getInitials(trip.driverName)}</div>
                                <div class="person-details">
                                    <h4>${trip.driverName}</h4>
                                    <p>${trip.vehicleNumber || 'Vehicle'}</p>
                                </div>
                            </div>
                            ${trip.driverRating ? `
                                <div style="padding-top: 10px; border-top: 1px solid rgba(255, 107, 0, 0.1); text-align: center;">
                                    <span class="highlight">⭐ ${trip.driverRating}</span> / 5.0
                                </div>
                            ` : ''}
                        </div>
                    </div>
                ` : ''}

                <div class="card">
                    <h3>📍 Trip Route</h3>
                    <div class="card-content">
                        <div class="location-item">
                            <div class="location-icon">📌</div>
                            <div class="location-details">
                                <div class="location-label">Pickup</div>
                                <div class="location-text">${formatAddress(trip.pickupLocation)}</div>
                            </div>
                        </div>
                        <div class="location-item">
                            <div class="location-icon">🎯</div>
                            <div class="location-details">
                                <div class="location-label">Dropoff</div>
                                <div class="location-text">${formatAddress(trip.dropoffLocation)}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="timeline">
                    <div class="timeline-title">📊 Trip Timeline</div>
            `;

            // Timeline items
            const timelineData = [
                { status: 'booked', label: 'Booking Confirmed', icon: '📋' },
                { status: 'driver_assigned', label: 'Driver Assigned', icon: '👤' },
                { status: 'arriving', label: 'Driver Arriving', icon: '🚗' },
                { status: 'in_progress', label: 'Trip In Progress', icon: '🚕' },
                { status: 'completed', label: 'Trip Completed', icon: '✅' }
            ];

            timelineData.forEach((item, index) => {
                const isCompleted = statuses.indexOf(item.status) < currentStatusIndex + 1 && trip.status !== 'cancelled';
                const isActive = item.status === trip.status;
                const cssClass = isActive ? 'active' : (isCompleted ? 'completed' : '');

                html += `
                    <div class="timeline-item ${cssClass}">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-status">${item.label}</div>
                            <div class="timeline-time">${trip[item.status + 'Time'] ? formatDateTime(trip[item.status + 'Time']) : 'Pending'}</div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            return html;
        }

        // Load trip data
        async function loadTrip() {
            const token = getTokenFromURL();

            if (!token) {
                renderError('Invalid trip link. Please check the URL and try again.');
                return;
            }

            try {
                const response = await fetch(`/api/trip/shared/${token}`);

                if (!response.ok) {
                    if (response.status === 404) {
                        renderError('Trip not found. The link may have expired or is invalid.');
                    } else {
                        renderError(`Error: ${response.status}. Unable to load trip details.`);
                    }
                    return;
                }

                const data = await response.json();

                if (!data.success || !data.trip) {
                    renderError('Unable to load trip details. Please try again later.');
                    return;
                }

                renderTripContent(data.trip);
            } catch (error) {
                console.error('Error loading trip:', error);
                renderError('Network error. Please check your connection and try again.');
            }
        }

        function renderTripContent(trip) {
            const content = document.getElementById('content');
            content.innerHTML = renderTripDetails(trip);
        }

        function renderError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <h2>Unable to Load Trip</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // Load trip on page load
        loadTrip();

        // Auto-refresh every 10 seconds
        setInterval(loadTrip, 10000);
    </script>
</body>
</html>
